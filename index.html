<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeetTodo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>KeetTodo</h1>
            <p class="subtitle">Stay organized, get things done</p>
            <button id="darkModeToggle" class="dark-mode-toggle" aria-label="Toggle dark mode">🌙</button>
        </header>

        <div class="todo-app">
            <div class="input-section">
                <input type="text" id="todoInput" placeholder="What needs to be done?" autocomplete="off">
                <button id="addBtn" class="add-btn">+</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="stats">
                <span id="itemsLeft">0 items left</span>
                <button id="clearCompleted" class="clear-btn">Clear completed</button>
            </div>
        </div>
    </div>

    <footer class="footer">Built with Claude</footer>

    <script src="app.js"></script>
</body>
</html>
